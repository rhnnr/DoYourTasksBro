                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H160Zm360-80h100v-480H520v480Zm-180 0h100v-480H340v480Zm-180 0h100v-480H160v480Zm540 0h100v-480H700v480Z"/></svg>

                    <span>Settings</span>
                </a>
            </li>
        </ul>
    </nav>

    <main id="app-container" class="bro-landing">
        <header id="control-panel">
            <h1>DoYourTimeBro</h1>

            <form id="schedule-form">
                <div class="form-row">
                    <input type="text" id="block-label" placeholder="Activity..." required/>
                    <div id="block-day">
                        <label><input type="checkbox" value="mon"> Monday</label>
                        <label><input type="checkbox" value="tue"> Tuesday</label>
                        <label><input type="checkbox" value="wed"> Wednesday</label>
                        <label><input type="checkbox" value="thu"> Thursday</label>
                        <label><input type="checkbox" value="fri"> Friday</label>
                        <label><input type="checkbox" value="sat"> Saturday</label>
                        <label><input type="checkbox" value="sun"> Sunday</label>
                    </div>
                </div>
                
                <div class="form-row">
                    <input type="time" id="block-start" required/>
                    <input type="time" id="block-end" required/>
                    <button type="submit" id="block-add">Lock Block</button>                       
                </div>
            </form>
        </header>

        <div id="matrix-wrapper">
            <div class="time-axis">
                <div class="axis-header">Time</div>
                <div class="axis-slots">
                    <div class="hour-slot">12 AM</div>
                    <div class="hour-slot">1 AM</div>
                    <div class="hour-slot">2 AM</div>
                    <div class="hour-slot">3 AM</div>
                    <div class="hour-slot">4 AM</div>
                    <div class="hour-slot">5 AM</div>
                    <div class="hour-slot">6 AM</div>
                    <div class="hour-slot">7 AM</div>
                    <div class="hour-slot">8 AM</div>
                    <div class="hour-slot">9 AM</div>
                    <div class="hour-slot">10 AM</div>
                    <div class="hour-slot">11 AM</div>
                    <div class="hour-slot">12 PM</div>
                    <div class="hour-slot">1 PM</div>
                    <div class="hour-slot">2 PM</div>
                    <div class="hour-slot">3 PM</div>
                    <div class="hour-slot">4 PM</div>
                    <div class="hour-slot">5 PM</div>
                    <div class="hour-slot">6 PM</div>
                    <div class="hour-slot">7 PM</div>
                    <div class="hour-slot">8 PM</div>
                    <div class="hour-slot">9 PM</div>
                    <div class="hour-slot">10 PM</div>
                    <div class="hour-slot">11 PM</div>
                </div>
            </div>

            <section id="timetable-matrix">
                <div class="day-column" id="col-sun"><h3 class="day-header">Sun</h3><div class="track-canvas"></div></div>
                <div class="day-column" id="col-mon"><h3 class="day-header">Mon</h3><div class="track-canvas"></div></div>
                <div class="day-column" id="col-tue"><h3 class="day-header">Tue</h3><div class="track-canvas"></div></div>
                <div class="day-column" id="col-wed"><h3 class="day-header">Wed</h3><div class="track-canvas"></div></div>
                <div class="day-column" id="col-thu"><h3 class="day-header">Thu</h3><div class="track-canvas"></div></div>
                <div class="day-column" id="col-fri"><h3 class="day-header">Fri</h3><div class="track-canvas"></div></div>
                <div class="day-column" id="col-sat"><h3 class="day-header">Sat</h3><div class="track-canvas"></div></div>
            </section>
                
        </div>
    </main>
</body>
</html>
