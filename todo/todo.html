<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>

                </span>
            </div>
        </label>
    </div>
    <nav id="sidebar" class="close">
        <ul>
            <li>
                <span class="logo"><h3>DoYourTasksBro</h3></span>
                <button onclick=toggleSidebar() id="toggle-btn">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M440-240 200-480l240-240 56 56-183 184 183 184-56 56Zm264 0L464-480l240-240 56 56-183 184 183 184-56 56Z"/></svg>                </button>
            </li>
            <li>
                <a href="../index.html">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M240-200h120v-240h240v240h120v-360L480-740 240-560v360Zm-80 80v-480l320-240 320 240v480H520v-240h-80v240H160Zm320-350Z"/></svg>
                    <span>Home</span>
                </a>
            </li>
            <li class="active">
                <a href="todo.html">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="m438-240 226-226-58-58-169 169-84-84-57 57 142 142ZM240-80q-33 0-56.5-23.5T160-160v-640q0-33 23.5-56.5T240-880h320l240 240v480q0 33-23.5 56.5T720-80H240Zm280-520v-200H240v640h480v-440H520ZM240-800v200-200 640-640Z"/></svg>
                    <span>Todo-List</span>
                </a>
            </li>
            <li>
                <a href="../timetable/timetable.html">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H160Zm360-80h100v-480H520v480Zm-180 0h100v-480H340v480Zm-180 0h100v-480H160v480Zm540 0h100v-480H700v480Z"/></svg>
                    <span>Time Table</span>
                </a>
            </li>
            <li>
                <a href="../settings/settings.html">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="m370-80-16-128q-13-5-24.5-12T307-235l-119 50L78-375l103-78q-1-7-1-13.5v-27q0-6.5 1-13.5L78-585l110-190 119 50q11-8 23-15t24-12l16-128h220l16 128q13 5 24.5 12t22.5 15l119-50 110 190-103 78q1 7 1 13.5v27q0 6.5-2 13.5l103 78-110 190-118-50q-11 8-23 15t-24 12L590-80H370Zm70-80h79l14-106q31-8 57.5-23.5T639-327l99 41 39-68-86-65q5-14 7-29.5t2-31.5q0-16-2-31.5t-7-29.5l86-65-39-68-99 42q-22-23-48.5-38.5T533-694l-13-106h-79l-14 106q-31 8-57.5 23.5T321-633l-99-41-39 68 86 64q-5 15-7 30t-2 32q0 16 2 31t7 30l-86 65 39 68 99-42q22 23 48.5 38.5T427-266l13 106Zm42-180q58 0 99-41t41-99q0-58-41-99t-99-41q-59 0-99.5 41T342-480q0 58 40.5 99t99.5 41Zm-2-140Z"/></svg>
                    <span>Settings</span>
                </a>
            </li>
        </ul>
    </nav>

    <main id="app-container" class="bro-landing">
        
        <header id="control-panel">
            <h1>DoYourTasksBro</h1>
            <div class="view-tabs">
                <button id="tab-todo" class="tab-btn active">Active Tasks</button>
                <button id="tab-history" class="tab-btn">Destroyed Pasts</button>
            </div>
        </header>

        <section id="todo-view">
            
            <div id="load-status">
                Load score: <span id="score-number">0</span>
            </div>
            
            <form id="task-form">
                <div class="input-wrapper">
                    <input type="text" id="task-input" placeholder="Type a commitment, Bro..."/>
                    <div id="counter-wrapper"><span id="live-weight-counter">0</span> pts</div>
                </div>
                <input type="date" id="task-deadline"/>
                <button type="submit" id="task-add">Add Task</button>
            </form>

            <div id="gravity-board"></div> 
        </section>

        <section id="history-section" class="hidden">
            <h1>YourHistoryBro</h1>
            <div id="history-log"></div>
        </section>

    </main>
</body>
</html>
